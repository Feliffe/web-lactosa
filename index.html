<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Oficial | Lactosa Intolerante</title>

    <link rel="icon" type="image/png" href="LogoLI.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Martian Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px; /* Un poco de aire en los bordes */
        }

        /* ESTO HA CAMBIADO: Se eliminan estilos de texto del h1 */
        h1 {
            margin-bottom: 0.5rem;
            /* Estos estilos ya no son necesarios para una imagen:
               font-size, font-weight, text-transform, letter-spacing
            */
        }

        /* NUEVO: Asegura que la imagen del nombre sea responsiva */
        h1 img {
            max-width: 65%;  /* Nunca será más ancha que su contenedor (body) */
            height: auto;      /* Mantendrá sus proporciones */
            /* Puedes controlar el tamaño máximo aquí. Ej: max-width: 600px; */
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            color: #888888;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
            text-transform: uppercase;
            padding-bottom: 5px;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: #ffffff;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #cccccc;
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #555555;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <h1>
        <img src="logo_lactosa_blanco.png" alt="Lactosa Intolerante - Sitio Oficial">
    </h1>

    <p class="subtitle">Sitio en Construcción</p>

    <div class="nav-links">
        <a href="#spotify" target="_blank">Música</a>
        <a href="#instagram" target="_blank">Instagram</a>
        <a href="#youtube" target="_blank">Video</a>
        <a href="mailto:contacto@tubanda.com">Contacto</a>
    </div>

    <footer>
        &copy; 2026 Lactosa Intolerante. Todos los derechos reservados.
    </footer>

</body>
</html>
